<svg xmlns="http://www.w3.org/2000/svg"
     width="1254" height="1254" viewBox="0 0 1254 1254"
     role="img" aria-label="Olive green check mark app icon">
  <defs>
    <radialGradient id="bg" cx="50%" cy="52%" r="72%">
      <stop offset="0%" stop-color="#373D26"/>
      <stop offset="68%" stop-color="#343A23"/>
      <stop offset="100%" stop-color="#303621"/>
    </radialGradient>

    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4F1E8"/>
      <stop offset="100%" stop-color="#ECE8DD"/>
    </linearGradient>

    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.8"
                    flood-color="#000000" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- Transparent corners; rounded app-icon body -->
  <rect x="0" y="0" width="1254" height="1254" rx="302" ry="302"
        fill="url(#bg)"/>

  <!-- Open circular outline -->
  <path d="M 854 337
           A 364 364 0 1 0 978 559"
        fill="none"
        stroke="url(#mark)"
        stroke-width="55"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#softShadow)"/>

  <!-- Check mark -->
  <path d="M 472 610
           L 614 751
           L 975 384"
        fill="none"
        stroke="url(#mark)"
        stroke-width="61"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#softShadow)"/>
</svg>
